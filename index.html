  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" />
  
  <style>
    :root {
      --bg-primary: rgb(255, 255, 255);
      --bg-primary-rgb: 255, 255, 255;
      --text-primary: rgb(12, 16, 20);
      --text-muted: rgba(12, 16, 20, 0.64);
      --surface-strong: rgba(255, 255, 255, 0.8);
      --surface-soft: rgba(255, 255, 255, 0.95);
      --border-theme: rgba(15, 23, 42, 0.18);
    }

    html.dark {
      --bg-primary: rgb(12, 16, 20);
      --bg-primary-rgb: 12, 16, 20;
      --text-primary: rgb(245, 245, 245);
      --text-muted: rgba(245, 245, 245, 0.68);
      --surface-strong: rgba(12, 16, 20, 0.8);
      --surface-soft: rgba(12, 16, 20, 0.95);
      --border-theme: rgba(148, 163, 184, 0.2);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-primary);
      background-color: var(--bg-primary);
      -webkit-tap-highlight-color: transparent;
    }

    .serif-scripture {
      font-family: 'Playfair Display', serif;
    }

    .bg-primary {
      background-color: var(--bg-primary) !important;
    }

    .bg-primary-soft {
      background-color: var(--surface-soft) !important;
    }

    .bg-primary-strong {
      background-color: var(--surface-strong) !important;
    }

    .border-theme {
      border-color: var(--border-theme) !important;
    }

    .text-primary {
      color: var(--text-primary) !important;
    }

    .text-muted {
      color: var(--text-muted) !important;
    }

    .card-surface {
      background: linear-gradient(180deg, rgba(var(--bg-primary-rgb), 0.98) 0%, rgba(var(--bg-primary-rgb), 0.96) 40%, rgba(var(--bg-primary-rgb), 0.92) 100%);
    }

    /* Hide scrollbar for Cleanliness */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Smooth Snap Scrolling Properties */
    .snap-container {
      scroll-snap-type: y mandatory;
      scroll-padding-top: 4rem;
    }
    main {
      touch-action: pan-y;
    }
    .snap-card {
      scroll-snap-align: start;
      scroll-snap-stop: always;
      min-height: calc(100vh - 12rem);
      height: auto;
      box-sizing: border-box;
    }
    .snap-card > .flex-1 {
      min-height: 0;
    }

    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: visible;
      z-index: 9999;
      pointer-events: none;
    }

    .confetti-piece {
      position: absolute;
      border-radius: 3px;
      opacity: 0;
      pointer-events: none;
      transform-origin: center center;
      width: 10px; height: 24px;
      animation: confettiPop 2s forwards;
    }

    @keyframes confettiPop {
      0% {
        opacity: 1;
        transform: rotate(0deg) scale(0.4);
      }

      100% {
        opacity: 0;
        transform: rotate(560deg) scale(0.7);
      }
    }

    .heart-burst {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.75);
      transition: opacity 0.2s ease, transform 0.3s ease;
      z-index: 20;
    }

    .heart-burst.animate {
      opacity: 1;
      animation: heartPop 0.8s ease forwards;
    }

    .heart-burst span {
      font-size: 3rem;
      color: rgba(239, 68, 68, 0.95);
      text-shadow: 0 0 22px rgba(248, 113, 113, 0.5);
    }

    @keyframes heartPop {
      0% { opacity: 0; transform: scale(0.5); }
      20% { opacity: 1; transform: scale(1.25); }
      60% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0; transform: scale(1.6); }
    }

    .main-tabs {
      position: fixed;
      inset: auto 0 0 0;
      width: 100%;
      max-width: none;
      /* padding: 0 1rem 1rem; */
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 28px 28px 0 0;
      isolation: isolate;
      touch-action: none;
      box-shadow: 0px -1px 18px rgba(0, 0, 0, 0.12);
      background-color: transparent;
      z-index: 20;
    }
    .main-tabs > div {
      width: 100%;
      max-width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-radius: 28px;
      background-color: var(--surface-soft);
      backdrop-filter: blur(10px) opacity(0.6);
      padding: 0.5rem 0.5rem;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .main-tabs button {
      border: none;
      background-color: transparent;
      padding: 12px;
      cursor: pointer;
      color: #4E5D6C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .main-tabs button span {
      font-size: 2rem;
    }

    #chaptersGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 12px;
      overflow-y: auto;
    }
    #chaptersGrid button {
      aspect-ratio: 1 / 1;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-theme);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: background-color 0.2s ease, color 0.2s ease;
    }
  </style>
</head>

</div>

    function getAmplifiedExplanation(word, definition) {
      const amplified = {
        love: 'Intense, self-giving affection and covenant loyalty',
        light: 'Spiritual illumination, revealed truth, and clarity',
        faith: 'Trust, reliance, and confident commitment to God',
        grace: 'Unearned favor, mercy, and empowering kindness',

        mercy: 'Compassion, rescue, and undeserved kindness',
        law: 'God’s instruction, covenant pathway, and moral order',

      };

      return amplified[word] || definition || 'Failed to load definition :(';
    }

    function lookupStrongs(word, bookName) {
      try {
        const dict = isOldTestament(bookName) ? window.strongsHebrewDictionary : window.strongsGreekDictionary;
        const lookupIndex = isOldTestament(bookName) ? window.strongsHebrewLookupIndex : window.strongsGreekLookupIndex;
        if (!dict) return null;
        const w = word.toLowerCase();

        function simpleStem(t) {
          if (t.length <= 3) return t;
          if (t.endsWith("'s")) t = t.slice(0, -2);
          if (t.endsWith('ies')) return t.slice(0, -3) + 'y';
          if (t.endsWith('s') && !t.endsWith('ss')) t = t.slice(0, -1);
          if (t.endsWith('ing')) t = t.slice(0, -3);
          if (t.endsWith('ed')) t = t.slice(0, -2);
          return t;
        }

        const wStem = simpleStem(w);
        const override = STRONGS_PREFERRED_WORDS[w] || STRONGS_PREFERRED_WORDS[wStem];
        if (override) {
          const preferredId = isOldTestament(bookName) ? (override.OT || override.NT) : (override.NT || override.OT);
          if (preferredId && dict[preferredId]) return { id: preferredId, entry: dict[preferredId] };
        }

        const candidates = new Map();
        const addCandidates = (ids) => {
          ids.slice(0, 40).forEach((id, idx) => {
            candidates.set(id, (candidates.get(id) || 0) + (40 - idx));
          });
        };

        if (lookupIndex) {
          addCandidates(lookupIndex[w] || []);
          if (wStem !== w) addCandidates(lookupIndex[wStem] || []);
        }

        if (candidates.size === 0) {
          for (const id in dict) candidates.set(id, 1);
        }

        let best = null;
        let bestScore = 0;

        for (const [id, baseWeight] of candidates.entries()) {
          const entry = dict[id];
          if (!entry) continue;

          const lemma = (entry.lemma || '').toLowerCase();
          const kjvText = (entry.kjv_def || entry.kjv || '').toLowerCase();
          const sdef = (entry.strongs_def || '').toLowerCase();
          const kjvTokens = kjvText ? kjvText.split(/[^a-zA-Z]+/).filter(Boolean) : [];
          const sTokens = sdef ? sdef.split(/[^a-zA-Z]+/).filter(Boolean) : [];

          let score = baseWeight;
          if (lemma && (lemma === w || lemma === wStem)) score += 120;
          if (kjvTokens[0] === w || kjvTokens[0] === wStem) score += 50;
          if (kjvTokens.includes(w) || kjvTokens.includes(wStem)) score += kjvTokens.length <= 3 ? 40 : 10;
          if (sTokens.includes(w) || sTokens.includes(wStem)) score += sTokens.length <= 3 ? 30 : 5;
          if (entry.translit || entry.xlit || entry.pron) score += 5;

          if (score > bestScore) {
            bestScore = score;
            best = { id, entry };
          }
        }

        if (best && bestScore >= 30) return best;
      } catch (e) {
        return null;
      }
      return null;
    }

    async function resolveOriginalWord(word, bookName) {
      const cacheKey = `${bookName}.${word}`;
      if (ORIGINAL_LANGUAGE_CACHE[cacheKey]) {
        return ORIGINAL_LANGUAGE_CACHE[cacheKey];
      }

      // Try Strong's local dictionary first
      const strongMatch = lookupStrongs(word, bookName);
      if (strongMatch) {
        const e = strongMatch.entry;
        const translit = e.translit || e.xlit || e.pron || e.transliteration || '';
        const rawDef = e.kjv_def || e.strongs_def || '';
        // Use an amplified-style explanation for the displayed "translation" while keeping raw entry available
        const translation = getAmplifiedExplanation(word, rawDef);
        const result = {
          original: e.lemma || word,
          transliteration: translit,
          translation: translation,
          // keep raw entry for deeper inspection, but do not expose source label in UI
          rawEntry: e,
          targetLanguage: isOldTestament(bookName) ? 'Hebrew' : 'Greek'
        };

        ORIGINAL_LANGUAGE_CACHE[cacheKey] = result;
        return result;
      }

      // Fallback: use built-in local fallback values when Strong's lookup fails.
      const fallback = ORIGINAL_FALLBACKS[word] || [word, word, 'Amplified contextual keyword'];
      const result = {
        original: fallback[0],
        transliteration: fallback[1] || word,
        translation: getAmplifiedExplanation(word, fallback[2]),
        targetLanguage: isOldTestament(bookName) ? 'Hebrew' : 'Greek'
      };

      ORIGINAL_LANGUAGE_CACHE[cacheKey] = result;
      return result;
    }

      Object.keys(keywordMap).forEach(word => {

      if (themes.length === 0) {
        themes.push('Spiritual instruction and theological reflection');

      let literaryStyle = 'Poetic or instructional biblical literature';
      if (lowerText.includes('jesus') || lowerText.includes('christ')) {
        literaryStyle = 'Christ-centered theological teaching';

      const bookEra = isOldTestament(book) ? 'Hebrew Bible tradition' : 'Greek New Testament context';
      const historicalInsight = `This passage comes from ${book} ${chapter}:${verse}, within the ${bookEra}. It reflects the cultural and religious backdrop of the original audience and the way early listeners would have absorbed the message.`;
      const application = `This scripture emphasizes ${themes[0].toLowerCase()}. It invites the reader to internalize the passage and allow the ideas to shape their life, obedience, and spiritual formation.`;

      return {
        themes,
        literaryStyle,
        application,

    // High performance API ingestion and chunking execution
    
async function renderFeed(customPassageData = null) {
      const feedView = document.getElementById('feedView');

      feedView.innerHTML = `
        <div class="h-full w-full flex flex-col justify-center items-center text-muted">
          <span class="animate-spin material-symbols-rounded text-3xl text-emerald-400 mb-2">progress_activity</span>
          Loading Scripture...
        </div>`;

      try {
        let cardsHTML = '';

        if (customPassageData) {
          cardsHTML = customPassageData;
        } else {
          const currentBookData = BIBLE_BOOKS.find(b => b.id === state.currentBook);

          if (!currentBookData) {
            throw new Error('Book not found');
          }

          const bookName = currentBookData.name;
          const chapterNum = state.currentChapter;

          // Bible API endpoint
          const query = encodeURIComponent(`${bookName} ${chapterNum}`);
          let url = `https://bible-api.com/${query}`;

          // Only append translation if supported
          const supportedTranslations = ['kjv', 'web', 'asv', 'bbe'];

          if (supportedTranslations.includes(state.currentTranslation)) {
            url += `?translation=${state.currentTranslation}`;
          }

          const res = await fetch(url);

          if (!res.ok) {
            throw new Error('API request failed');
          }

          const data = await res.json();

          if (!data.verses || data.verses.length === 0) {
            throw new Error('No verses returned');
          }

          const totalVerses = data.verses.map(v => ({
            number: v.verse,
            text: v.text.trim()
          }));

          const verseGroups = groupVersesForCards(totalVerses, 40);

          verseGroups.forEach(group => {
            cardsHTML += compileCardMarkup(group, bookName, chapterNum);
          });

          const hasNextChapter = currentBookData && state.currentChapter < currentBookData.chapters;
          if (hasNextChapter) {
            cardsHTML += renderNextChapterCard(currentBookData.name, state.currentChapter + 1);
          }
        }

        feedView.innerHTML = cardsHTML;
        setupCardGestures();
        observeNextChapterCard();

      } catch (err) {
        console.error(err);

        feedView.innerHTML = `
          <div class="h-full w-full flex flex-col justify-center items-center p-8 text-center text-muted">
            <span class="material-symbols-rounded text-red-400 text-5xl mb-3">error</span>
            <p class="font-semibold text-primary mb-2">Unable to load Scripture.</p>
            <p class="text-xs text-muted mb-4 max-w-xs">
              The Bible API may be temporarily unavailable or the selected translation may not support this passage.
            </p>

            <button onclick="resetToGenesis()"
              class="px-4 py-2 bg-emerald-600 text-white rounded-xl text-sm font-semibold">
              Load Genesis 1
            </button>
          </div>`;
      }
    }

    function renderNextChapterCard(bookName, nextChapterNum) {

    function observeNextChapterCard() {
      const feedView = document.getElementById('feedView');
      const nextCard = feedView.querySelector('.next-chapter-trigger');
      const confettiContainer = document.getElementById('confettiContainer');
      if (!nextCard || !confettiContainer || !window.IntersectionObserver) return;

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (!entry.isIntersecting || entry.target.dataset.confettiFired) return;
          entry.target.dataset.confettiFired = 'true';
          setTimeout(() => triggerConfettiBurst(confettiContainer, entry.target), 400);
          obs.unobserve(entry.target);
        });
      }, {
        root: feedView,
        threshold: 0.55,
      });

      observer.observe(nextCard);
    }

    function triggerConfettiBurst(container, sourceCard) {
      const button = sourceCard.querySelector('button');
      const sourceRect = button ? button.getBoundingClientRect() : sourceCard.getBoundingClientRect();
      const startX = sourceRect.left + sourceRect.width * 0.5;
      const startY = sourceRect.top + (sourceRect.height * 0.5);

      const colors = ['#16a34a', '#059669', '#84cc16', '#22c55e', '#4ade80', '#d97706', '#f59e0b', '#ec4899'];
      const pieces = 50;
      const g = 0.00018;
      const duration = 2400;

      for (let i = 0; i < pieces; i += 1) {
        const piece = document.createElement('div');
        const width = 8 + Math.random() * 14;
        const height = 16 + Math.random() * 20;
        const color = colors[Math.floor(Math.random() * colors.length)];

        const angle = (Math.random() * 160) * (Math.PI / 180);
        const speed = 420 + Math.random() * 400;
        const vx = (Math.cos(angle) * speed) / 3;
        const vy = -Math.sin(angle) * (220 + Math.random() * 200);
        const rotationSpeed = 1440 + Math.random() * 720;

        piece.className = 'confetti-piece';
        piece.style.width = `${width}px`;
        piece.style.height = `${height}px`;
        piece.style.backgroundColor = color;
        piece.style.left = `${Math.round(startX - width / 2)}px`;
        piece.style.top = `${Math.round(startY - (height / 2))}px`;

        container.appendChild(piece);

        const startTime = performance.now();
        const initialRotation = Math.random() * 360;

        function animate(currentTime) {
          const elapsed = currentTime - startTime;
          if (elapsed >= duration) {
            piece.remove();
            return;
          }

          const t = elapsed / 1000;
          const x = startX - width / 2 + vx * t;
          const y = startY - height / 2 + vy * t + 0.5 * g * t * t * 1000000;
          const rotation = initialRotation + (rotationSpeed * t);
          const opacity = Math.max(0, 1 - elapsed / duration);

          piece.style.left = `${Math.round(x)}px`;
          piece.style.top = `${Math.round(y)}px`;
          piece.style.transform = `rotate(${rotation}deg)`;
          piece.style.opacity = opacity;

          if (elapsed < duration) {
            requestAnimationFrame(animate);
          }
        }

        requestAnimationFrame(animate);
      }
    }

    function loadNextChapter() {
      const currentBookData = BIBLE_BOOKS.find(b => b.id === state.currentBook);
      if (!currentBookData) return;
      if (state.currentChapter >= currentBookData.chapters) return;

      state.currentChapter += 1;
      document.getElementById('readingHeaderTitle').innerText = `${currentBookData.name} ${state.currentChapter}`;
      saveAppSettings();
      renderFeed();
    }

    function groupVersesForCards(verses, maxWords = 40) {
      const groups = [];
      let currentGroup = [];
      let currentCount = 0;

      for (const verse of verses) {
        const verseWords = verse.text.trim().split(/\s+/).filter(Boolean).length;
        const shouldStartNewCard = currentGroup.length > 0 && currentCount + verseWords > maxWords;

        if (shouldStartNewCard) {
          groups.push(currentGroup);
          currentGroup = [];
          currentCount = 0;
        }

        currentGroup.push(verse);
        currentCount += verseWords;

        if (currentGroup.length === 1 && verseWords > maxWords) {
          groups.push(currentGroup);
          currentGroup = [];
          currentCount = 0;
        }
      }

      if (currentGroup.length > 0) {
        groups.push(currentGroup);
      }

      return groups;
    }

    // Process array chunks into structural HTML layout
    function compileCardMarkup(verses, bookName, chapterNum) {
      const uniqueCardId = `${bookName.replace(/\s+/g, '')}-${chapterNum}-${verses[0].number}`;
      
      // Calculate references
      const startVerse = verses[0].number;
      const endVerse = verses[verses.length - 1].number;
      const refString = `${bookName} ${chapterNum}:${startVerse}${startVerse !== endVerse ? `-${endVerse}` : ''}`;

      const cardMatch = state.savedHighlights.find(h => h.id === uniqueCardId);
      const highlightClass = cardMatch ? cardMatch.color : '';

      let innerVersesHTML = verses.map(v => {
        const itemKey = uniqueCardId;
        const highlightClassForVerse = highlightClass;

        // Tokenize verse text into words and punctuation, preserving spacing
        const tokens = v.text.split(/(\s+|[.,;:!?()\[\]"“”])/g).map(tok => {
          if (!tok || /^\s+$/.test(tok) || /^([.,;:!?()\[\]"“”])$/.test(tok)) return tok;

          const wordMatch = tok.match(/\b[A-Za-z']+\b/);
          if (wordMatch) {
            const w = wordMatch[0];
            // skip very short words
            if (w.length <= 2) return `<span class="verse-word" data-word="${w}">${tok}</span>`;
            try {
              const strong = lookupStrongs(w, bookName);
              if (strong) {
                const id = strong.id;
                const e = strong.entry || {};
                const lemma = (e.lemma || '').replace(/"/g, '&quot;');
                const translit = (e.translit || e.xlit || e.pron || '') .replace(/"/g, '&quot;');
                const kjv = (e.kjv_def || e.strongs_def || '') .replace(/"/g, '&quot;');

                return `<span class="verse-word has-strong" data-strong-id="${id}" data-strong-lemma="${lemma}" data-strong-translit="${translit}" data-strong-kjv="${kjv}">${tok}</span>`;
              }
            } catch (e) {
              // fall through to default rendering
            }

            return `<span class="verse-word" data-word="${w}">${tok}</span>`;
          }

          return tok;
        }).join('');

        return `<span class="verse-token transition-colors duration-300 rounded ${highlightClass}" data-key="${itemKey}" data-text="${v.text.replace(/\"/g, '&quot;')}" data-book="${bookName}" data-chap="${chapterNum}" data-vnum="${v.number}"><sup class="text-[10px] font-bold text-emerald-500/80 mr-1 tracking-tight">${v.number}</sup>${tokens}</span>`;
      }).join(' ');

      return `
        <div class="snap-card w-full h-full flex-shrink-0 flex flex-col justify-between p-5 relative card-surface border-b border-theme" data-card-id="${uniqueCardId}">
          <div class="absolute inset-0 bg-radial from-emerald-500/5 via-transparent to-transparent pointer-events-none opacity-40"></div>
          
          <div class="flex justify-between items-center z-10 pt-3">
            <span class="text-xs font-semibold tracking-wider text-muted uppercase flex items-center gap-1.5">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> ${refString}
            </span>
            <span class="text-[10px] bg-primary px-2 py-0.5 rounded text-muted uppercase tracking-widest">${state.currentTranslation}</span>
          </div>

          <div class="flex-1 flex flex-col justify-center my-auto z-10 max-w-sm mx-auto">
            <p class="serif-scripture text-[19px] leading-[1.55] text-primary tracking-wide select-none">
              ${innerVersesHTML}
            </p>
            <p class="text-[10px] text-muted text-center mt-4 tracking-wide italic">Tip: Double-tap to highlight</p>
          </div>

          <div class="heart-burst" id="heartBurst-${uniqueCardId}"><span class="material-symbols-rounded">favorite</span></div>

          <div class="flex justify-between items-center z-10 pb-4 pt-2 border-t border-theme">
            <div class="flex gap-4">
              <button id="highlightBtn-${uniqueCardId}" class="highlight-toggle-button flex items-center gap-1.5 transition-colors ${cardMatch ? 'text-red-500 hover:text-red-400' : 'text-muted hover:text-emerald-400'}" onclick="toggleCardHighlight('${uniqueCardId}')">
                <span class="material-symbols-rounded">favorite</span>

    // Gestures engine linking full layout double-taps to actions
    function setupCardGestures() {
      document.querySelectorAll('.snap-card').forEach(card => {
        card.addEventListener('touchend', function(e) {
          // Filter button actions away from structural gestures
          if(e.target.closest('button') || e.target.closest('input') || e.target.closest('.z-30')) return;
          
          const currentTime = new Date().getTime();
          const tapLength = currentTime - state.lastTap;
          
          if (tapLength < 300 && tapLength > 0) {
            handleDoubleTapHighlight(card);
            e.preventDefault();
          }
          state.lastTap = currentTime;
        });
        
        // Desktop Click processing optimization
        card.addEventListener('dblclick', function(e) {
          if(e.target.closest('button') || e.target.closest('input') || e.target.closest('.z-30')) return;
          handleDoubleTapHighlight(card);
        });
      });
    }

    function handleDoubleTapHighlight(cardElement) {
      toggleCardHighlight(cardElement.dataset.cardId);
    }

    function toggleCardHighlight(cardId) {
      const card = document.querySelector(`[data-card-id="${cardId}"]`);
      if (!card) return;

      const tokens = Array.from(card.querySelectorAll('.verse-token'));
      if (tokens.length === 0) return;

      const existingIdx = state.savedHighlights.findIndex(h => h.id === cardId);
      const isAlreadyHighlighted = existingIdx > -1;
      const defaultColor = state.defaultHighlightColor || 'bg-yellow-500/20';

      if (isAlreadyHighlighted) {
        return;
      }

      const book = tokens[0].getAttribute('data-book');
      const chap = parseInt(tokens[0].getAttribute('data-chap'));
      const verseNums = tokens.map(t => parseInt(t.getAttribute('data-vnum'))).filter(Boolean);
      const startVerse = Math.min(...verseNums);
      const endVerse = Math.max(...verseNums);
      const text = tokens.map(token => token.getAttribute('data-text')).join(' ');

      state.savedHighlights.push({
        id: cardId,
        text,
        book,
        chapter: chap,
        startVerse,
        endVerse,
        color: defaultColor
      });

      tokens.forEach(token => {
        token.className = `verse-token transition-colors duration-300 rounded ${defaultColor}`;
      });

      const highlightBtn = card.querySelector('.highlight-toggle-button');
      if (highlightBtn) {
        highlightBtn.classList.remove('text-muted', 'hover:text-emerald-400');
        highlightBtn.classList.add('text-red-500', 'hover:text-red-400');
      }

      triggerHeartBurst(cardId);
      saveToLocalStorage();
      saveAppSettings();
      renderSavedHighlightsList();
    }

    // Dynamic Deep Dive Modal engine filling original data tracking items
    async function openDeepDive(cardId) {
      const card = document.querySelector(`[data-card-id="${cardId}"]`);
      const tokens = Array.from(card.querySelectorAll('.verse-token'));
      const text = tokens.map(token => token.getAttribute('data-text')).join(' ');
      const book = tokens[0]?.getAttribute('data-book') || '';
      const chapter = tokens[0]?.getAttribute('data-chap') || '';
      const verse = tokens[0]?.getAttribute('data-vnum') || '';

      // Significant verse-level word analysis
      const insignificantWords = [
        'the','and','a','an','to','of','in','on','for','with','that','this',
        'is','was','are','were','be','by','it','as','from','at','or','but',
        'if','then','into','through','he','she','they','we','you','i'
      ];

      const words = text.match(/\b[A-Za-z']+\b/g) || [];
      const significantWords = [];

      words.forEach(word => {
        const cleanWord = word.toLowerCase();

        if (
          cleanWord.length > 2 &&
          !insignificantWords.includes(cleanWord) &&
          !significantWords.includes(cleanWord)
        ) {
          significantWords.push(cleanWord);
        }
      });

      const limitedWords = significantWords.slice(0, 16);
      const originalWordData = await Promise.all(limitedWords.map(word => resolveOriginalWord(word, book)));

      const originalHTML = limitedWords.map((word, index) => {
        const mapping = originalWordData[index] || {};
        const strongDef = mapping.rawEntry ? (mapping.rawEntry.kjv_def || mapping.rawEntry.strongs_def || '') : '';
        const strongDefLine = strongDef ? `<p class="text-[10px] text-muted mt-1 italic">${strongDef}</p>` : '';

        return `
          <div class="bg-primary p-3 rounded-xl border border-theme">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1">
                <p class="text-sm font-semibold text-primary capitalize">${word}</p>
                <p class="text-[10px] text-muted mt-1">${mapping.translation || ''}</p>
                ${strongDefLine}
              </div>
              <div class="text-right min-w-[6rem]">
                <p class="text-sm text-emerald-400 font-serif font-semibold">${mapping.original || ''}</p>
                <p class="text-[10px] text-muted italic mt-1">${mapping.transliteration || ''}</p>
              </div>
            </div>
          </div>
        `;
      }).join('');

      const targetLanguageLabel = isOldTestament(book) ? 'Hebrew' : 'Greek';

      document.getElementById('drawerContentOriginal').innerHTML = `
        <div class="bg-primary p-3 rounded-xl border border-theme mb-2">
          <p class="text-xs text-muted italic">Original language terms dynamically resolved for ${targetLanguageLabel}. Scroll for more keywords.</p>

        <div class="max-h-[40vh] overflow-y-auto space-y-3 pr-1">
          ${originalHTML}

      const lowerText = text.toLowerCase();

      document.getElementById('drawerContentContext').innerHTML = `
        <div class="flex flex-col gap-3">

          <div class="bg-primary p-3 rounded-xl border border-theme">
            <h4 class="text-xs font-semibold text-emerald-400 mb-2">Core Themes</h4>

            <div class="flex flex-col gap-2">
              ${context.themes.map(theme => `
                <div class="bg-primary border border-theme rounded-lg px-3 py-2">
                  <p class="text-xs text-muted">${theme}</p>

    function setupTabSwipeGestures() {
      const container = document.querySelector('main');
      if (!container || !window.TouchEvent) return;

      let startX = 0;
      let startY = 0;
      let tracking = false;

      container.addEventListener('touchstart', (event) => {
        if (event.touches.length !== 1) return;
        const target = event.target;
        if (target instanceof Element && target.closest('button, input, textarea, select, a')) return;

        startX = event.touches[0].clientX;
        startY = event.touches[0].clientY;
        tracking = true;
      }, { passive: true });

      container.addEventListener('touchmove', (event) => {
        if (!tracking) return;
        const deltaX = event.touches[0].clientX - startX;
        const deltaY = event.touches[0].clientY - startY;

        if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 20) {
          event.preventDefault();
        }
      }, { passive: false });

      container.addEventListener('touchend', (event) => {
        if (!tracking || event.changedTouches.length !== 1) return;
        tracking = false;

        const endX = event.changedTouches[0].clientX;
        const endY = event.changedTouches[0].clientY;
        const deltaX = endX - startX;
        const deltaY = endY - startY;

        if (Math.abs(deltaX) < 60 || Math.abs(deltaX) < Math.abs(deltaY) * 1.5) return;

        const direction = deltaX < 0 ? 1 : -1;
        const nextView = getAdjacentTab(state.activeView, direction);
        if (nextView) switchView(nextView);
      }, { passive: true });
    }

    async function renderTrendingAlgorithmicShuffle() {
      const feedView = document.getElementById('feedView');

      feedView.innerHTML = `
        <div class="h-full w-full flex flex-col justify-center items-center text-muted">
          <span class="animate-spin material-symbols-rounded text-3xl text-amber-400 mb-2">
            bolt
          </span>
          Assembling Trending Fabric...
        </div>
      `;

      try {
        // Random trending verse
        const selected =
          trendingPassages[
            Math.floor(Math.random() * trendingPassages.length)
          ];

        // Build API query
        const query = encodeURIComponent(selected.book + ' ' + selected.chapter + ':' + selected.startVerse + '-' + selected.endVerse);

        let url = `https://bible-api.com/${query}`;

        // Supported translations
        const supportedTranslations = ['kjv', 'web', 'asv', 'bbe'];

        if (supportedTranslations.includes(state.currentTranslation)) {
          url += `?translation=${state.currentTranslation}`;
        }

        console.log('Fetching:', url);

        const res = await fetch(url);

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();

        // Convert API response to your card format
        const verses = data.verses.map(v => ({
          number: v.verse,
          text: v.text.trim()
        }));

        // Extract chapter number safely
        const chapter = data.verses[0]?.chapter || 1;

        let cardHTML = `
          <div class="absolute top-14 left-1/2 transform -translate-x-1/2 bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider uppercase z-30 flex items-center gap-1 shadow-lg backdrop-blur-xs">
            <span class="material-symbols-rounded text-xs animate-pulse">
              local_fire_department
            </span>
            Suggested for you
          </div>
        `;

        cardHTML += compileCardMarkup(
          verses,
          data.reference.split(' ')[0],
          chapter
        );

        feedView.innerHTML = cardHTML;

        setupCardGestures();

      } catch (err) {
        console.error('Trending render failed:', err);

        // Graceful fallback
        state.currentBook = 'PSA';
        state.currentChapter = 23;

        renderFeed();
      }
    }

    // Fill Saved Personal Highlights tracking panels
    function renderSavedHighlightsList() {
      const container = document.getElementById('savedContainer');
      if (state.savedHighlights.length === 0) {
        container.innerHTML = `
          <div class="py-12 text-center text-muted text-xs">
            <span class="material-symbols-rounded text-3xl opacity-20 mb-1">bookmark_border</span>
            <p>No highlights saved yet. Double-tap a verse in your feed view to start collecting highlights.</p>
          </div>`;
        return;
      }

      const highlights = [...state.savedHighlights].reverse();
      container.innerHTML = highlights.map(h => `
        <div onclick="openSavedHighlight('${h.id}')" class="cursor-pointer p-4 bg-primary border border-theme rounded-xl relative overflow-hidden flex flex-col gap-2 hover:border-emerald-400 transition-colors">
          <div class="absolute left-0 inset-y-0 w-1 ${((h.color || '').replace('/20', '') || 'bg-amber-400')}"></div>
          <div class="flex justify-between items-center text-[10px] text-muted font-semibold uppercase">
            <span>${h.book} ${h.chapter}:${h.startVerse ? `${h.startVerse}${h.endVerse && h.startVerse !== h.endVerse ? `-${h.endVerse}` : ''}` : h.verse}</span>
            <button onclick="event.stopPropagation(); removeIndividualHighlight('${h.id}')" class="text-muted hover:text-red-400 text-xs font-normal cursor-pointer transition-colors">
              <span class="material-symbols-rounded">delete</span>
            </button>
          </div>
          <p class="serif-scripture text-sm text-primary leading-relaxed italic">"${h.text}"</p>
        </div>
      `).join('');
    }

    function removeIndividualHighlight(highlightId) {
      state.savedHighlights = state.savedHighlights.filter(h => h.id !== highlightId);
      saveToLocalStorage();
      renderSavedHighlightsList();
    }

    function openSavedHighlight(highlightId) {
      const highlight = state.savedHighlights.find(h => h.id === highlightId);
      if (!highlight) return;

      const bookData = BIBLE_BOOKS.find(b => b.id === highlight.book.toUpperCase() || b.name.toUpperCase() === highlight.book.toUpperCase());
      if (bookData) {
        state.currentBook = bookData.id;
        state.currentChapter = highlight.chapter;
      }

      const currentBookData = BIBLE_BOOKS.find(b => b.id === state.currentBook);
      if (currentBookData) {
        document.getElementById('readingHeaderTitle').innerText = `${currentBookData.name} ${state.currentChapter}`;
      }

      document.getElementById('readingHeader').classList.remove('hidden');
      document.getElementById('feedView').style.display = 'flex';
      document.getElementById('browseView').style.display = 'none';
      document.getElementById('savedView').style.display = 'none';

      renderFeed();
    }

    // Local Storage Persistence layer mechanics
    function saveToLocalStorage() {
      localStorage.setItem('aura_bible_highlights', JSON.stringify(state.savedHighlights));
      localStorage.setItem('aura_bible_notes', JSON.stringify(state.savedNotes));
    }

    function loadSavedState() {
      const highlightsLocal = localStorage.getItem('aura_bible_highlights');
      if (highlightsLocal) {
        try { state.savedHighlights = JSON.parse(highlightsLocal); } catch(e) { state.savedHighlights = []; }
      }

      const notesLocal = localStorage.getItem('aura_bible_notes');
      if (notesLocal) {
        try { state.savedNotes = JSON.parse(notesLocal); } catch(e) { state.savedNotes = {}; }
      }

      const settings = localStorage.getItem('aura_bible_settings');
      if (settings) {
        try {
          const persisted = JSON.parse(settings);
          if (persisted.currentBook) state.currentBook = persisted.currentBook;
          if (persisted.currentChapter) state.currentChapter = persisted.currentChapter;
          if (persisted.themeMode) state.themeMode = persisted.themeMode;
          if (persisted.defaultHighlightColor) state.defaultHighlightColor = persisted.defaultHighlightColor;
          if (persisted.currentTranslation) state.currentTranslation = persisted.currentTranslation;
        } catch(e) {}
      }

      const savedTranslation = localStorage.getItem('aura_bible_translation');
      if (savedTranslation) {
        state.currentTranslation = savedTranslation;
      }

      setThemeMode(state.themeMode);
    }
